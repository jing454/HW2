<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Restaurant X</title>
    <!-- Loading navbar.css -->
    <link rel="stylesheet" href="../navbar.css">
    <link rel="stylesheet" href="./cart.css">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
      <input type="checkbox" id="nav-toggle">
      <label for="nav-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <ul>
        <!-- Navigation logo -->
         <li class="logo">
          <a href="../Home/index.html">
            <img src="../logo.png" alt="Logo" width="50" height="50">
            <span>Restaurant X</span>
          </a>
         </li>
        <!-- Navigation links -->
        <li><a class="shade" href="../Home/index.html">Home</a></li>
        <li><a class="shade" href="../Menu/Menu.html">Menu</a></li>
        <li><a class="shade" href="../Gallery/Gallery.html">Gallery</a></li>
        <li><a class="shade" href="../Contact/Contact.html">Contact</a></li>
        <li>
  <a class="shade" href="../Cart/cart.html">
  <i class="fas fa-shopping-cart"></i> Cart
</a>
</li>
      </ul>
    </div>

    <h1>Shopping Cart</h1>

    <div class="cart-container">
        <div class="cart-items-section">
            <h2>Your Items</h2>
            <div id="cartItemsContainer" class="cart-items">
                <!-- Cart items will be dynamically inserted here -->
            </div>
        </div>

        <div class="cart-summary">
            <h2>Order Summary</h2>
            <div class="summary-content">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (10%):</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
                <button id="checkoutBtn" class="btn-checkout">Proceed to Checkout</button>
                <button id="clearCartBtn" class="btn-clear">Clear Cart</button>
            </div>
        </div>
    </div>

    <div id="emptyCartMessage" class="empty-cart-message" style="display: none;">
        <i class="fas fa-shopping-cart"></i>
        <p>Your cart is empty</p>
        <a href="../Menu/Menu.html" class="btn-continue-shopping">Continue Shopping</a>
    </div>

    <script src="./cart.js"></script>
</body>
</html>
