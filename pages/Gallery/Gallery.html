<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Restaurant X</title>

    <!-- Loading navbar.css -->
    <link rel="stylesheet" href="../navbar.css">
    <link rel="stylesheet" href="./Gallery.css">
    <!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>
    <div class="navbar">
      <input type="checkbox" id="nav-toggle">
      <label for="nav-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <ul>
        <!-- Navigation logo -->
         <li class="logo">
          <a href="../Home/index.html">
            <img src="../logo.png" alt="Logo" width="50" height="50">
            <span>Restaurant X</span>
          </a>
         </li>
        <!-- Navigation links -->
        <li><a class="shade" href="../Home/index.html">Home</a></li>
        <li><a class="shade" href="../Menu/Menu.html">Menu</a></li>
        <li><a class="shade" href="../Gallery/Gallery.html">Gallery</a></li>
        <li><a class="shade" href="../Contact/Contact.html">Contact</a></li>
        <li>
<a class="shade" href="../Cart/cart.html">
  <i class="fas fa-shopping-cart"></i> Cart
</a>
</li>
      </ul>
    </div>

    <h1>Gallery</h1>

    <!-- Image Slider -->
    <div class="slider-container">
        <div class="slider-wrapper">
            <div class="slide fade">
                <img src="../Menu/items/Cheeseburger.png" alt="Delicious Burger">
            </div>
            <div class="slide fade">
                <img src="../Menu/items/Pasta.png" alt="Fresh Pasta Dish">
            </div>
            <div class="slide fade">
                <img src="../Menu/items/Pizza.png" alt="Crispy Pizza">
            </div>
            <div class="slide fade">
                <img src="./items/inside.png" alt="Restaurant Interior">
            </div>
            <div class="slide fade">
                <img src="./items/fl2.png" alt="fl2">
            </div>
            <div class="slide fade">
                <img src="./items/chill_area.png" alt="Chill area">
            </div>
        </div>

        <!-- Navigation Buttons -->
        <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
        <a class="next" onclick="changeSlide(1)">&#10095;</a>
    </div>

    <!-- Dots for slide indicators -->
    <div class="dots-container">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        <span class="dot" onclick="currentSlide(4)"></span>
        <span class="dot" onclick="currentSlide(5)"></span>
        <span class="dot" onclick="currentSlide(6)"></span>
    </div>

    <script>
      // Javascript for image slider 
        let slideIndex = 1;

        function changeSlide(n) {
            showSlide(slideIndex += n);
        }

        function currentSlide(n) {
            showSlide(slideIndex = n);
        }

        function showSlide(n) {
            const slides = document.getElementsByClassName("slide");
            const dots = document.getElementsByClassName("dot");

            if (n > slides.length) {
                slideIndex = 1;
            }
            if (n < 1) {
                slideIndex = slides.length;
            }

            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            for (let i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active", "");
            }

            slides[slideIndex - 1].style.display = "block";
            dots[slideIndex - 1].className += " active";
        }

        // Initialize slider
        showSlide(slideIndex);

        // Auto-advance slides every 5 seconds
        setInterval(() => {
            changeSlide(1);
        }, 5000);
    </script>
    <script src="../Cart/cart.js"></script>

</body>
</html>
